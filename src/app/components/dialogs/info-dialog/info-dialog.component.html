<h2 mat-dialog-title  class="custom-dialog-title">{{ data.title }}</h2>
<mat-dialog-content>


  <p style="white-space: pre-wrap; background: #D4DCE0; padding: 10px; border-radius: 0; width: 100%; margin: 0; box-sizing: border-box;">
    {{ data.detail?.trim() }}
  </p>
</mat-dialog-content>
<mat-dialog-actions align="end">
  <button mat-button mat-dialog-close class="close-button">Schließen</button>
</mat-dialog-actions>
