<h2 mat-dialog-title class="custom-dialog-title">{{ data.title || 'Löschen einer Abwesenheit' }}</h2>
<mat-dialog-content class="content-main">
  <p>{{ data.message || 'Wollen Sie die Abwesenheit löschen?' }}</p>
</mat-dialog-content>
<mat-dialog-actions align="end">
  <button mat-stroked-button color="primary" class="button-nein" (click)="cancel()">Nein</button>
  <button mat-stroked-button color="primary" class="button-ja" (click)="confirmDelete()">Ja</button>
</mat-dialog-actions>
