<mat-toolbar color="white" class="header-toolbar">
  <div class="logo-section">
    <a routerLink="/anwesenheitsliste" class="bmi-logo-link" aria-label="Zur Anwesenheitsliste">
      <img src="assets/images/BMI_Logo_srgb.png" alt="BMI" class="bmi-logo" />
    </a>
  </div>
  <span class="toolbar-spacer"></span>
  <div class="right-content">
    <div class="environment-container" [ngClass]="environmentClass">
      <span class="environment-label">{{ environmentLabel }}</span>
    </div>
  </div>
</mat-toolbar>
